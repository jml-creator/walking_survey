name: Deploy to GitHub Pages

on:
  push:
    branches: [main]

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Inject Dropbox secrets
        run: |
          sed -i "s/YOUR_APP_KEY_HERE/${{ secrets.DBX_APP_KEY }}/g" index.html
          sed -i "s/YOUR_APP_SECRET_HERE/${{ secrets.DBX_APP_SECRET }}/g" index.html
          sed -i "s/YOUR_REFRESH_TOKEN_HERE/${{ secrets.DBX_REFRESH_TOKEN }}/g" index.html

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: .

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
