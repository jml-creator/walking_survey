name: Deploy to GitHub Pages

on:
  push:
    branches: [main]

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Inject Dropbox secrets
        env:
          DBX_KEY: ${{ secrets.DBX_APP_KEY }}
          DBX_SECRET: ${{ secrets.DBX_APP_SECRET }}
          DBX_TOKEN: ${{ secrets.DBX_REFRESH_TOKEN }}
        run: |
          python3 -c "
          import os
          with open('index.html','r') as f: s=f.read()
          s=s.replace('YOUR_APP_KEY_HERE',os.environ['DBX_KEY'])
          s=s.replace('YOUR_APP_SECRET_HERE',os.environ['DBX_SECRET'])
          s=s.replace('YOUR_REFRESH_TOKEN_HERE',os.environ['DBX_TOKEN'])
          with open('index.html','w') as f: f.write(s)
          "

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: .

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
